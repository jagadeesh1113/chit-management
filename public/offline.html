<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ManageChit — Offline</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f172a;
      color: #f1f5f9;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100dvh;
      padding: 2rem;
      text-align: center;
    }
    .icon {
      width: 80px;
      height: 80px;
      background: #1e293b;
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
      font-weight: bold;
      color: #38bdf8;
      margin-bottom: 1.5rem;
    }
    h1 { font-size: 1.5rem; font-weight: 700; margin-bottom: 0.5rem; }
    p { font-size: 0.95rem; color: #94a3b8; margin-bottom: 2rem; line-height: 1.6; }
    button {
      background: #0ea5e9;
      color: white;
      border: none;
      padding: 0.75rem 2rem;
      border-radius: 12px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
    }
    button:active { opacity: 0.85; }
  </style>
</head>
<body>
  <div class="icon">MC</div>
  <h1>You're offline</h1>
  <p>No internet connection found.<br />Check your connection and try again.</p>
  <button onclick="window.location.reload()">Try again</button>
</body>
</html>
